<body>
     <script language = "javascript">
        var D = new Date();
        var NamSinh, NamHienTai;
        NamHienTai = D.getYear();
        NamSinh = prompt("ban sinh nam bao nhieu ? : ","");
        do{
            NamSinh = prompt("ban sinh nam bao nhieu ? : ","");
        }
        while (parseInt(NamSinh) > NamHienTai);
        alert ("tuoi cua ban la: " + (NamHienTai-NamSinh));
    </script>
</body>
