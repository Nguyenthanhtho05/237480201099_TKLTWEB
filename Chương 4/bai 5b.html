<head>

<body>
    <script language = "javascript"> 
        var D = new Date();
        var ngay = D.getDate();
        var thang = D.getMonth() + 1;
        var nam = D.getFullYear();
        document.write("Bây giờ là : " + ngay + " / " + thang + " / " + nam);
    </script>
</body>
